<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2ecc71">
<title>Course en Durée J2B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════
     ÉCRAN 1 — CONNEXION
══════════════════════════════════════════════════ -->
<div id="screen-login" class="screen active">
  <div style="width:100%;max-width:400px;margin:auto">
    <div class="login-hero">
      <div class="login-icon">🏃</div>
      <div class="login-logo">Course en Durée</div>
      <div class="login-sub">J2B · 2025 · 2026</div>
    </div>
    <div class="login-card">
      <h2>Connexion</h2>
      <div class="field">
        <label class="field-label">Ma classe</label>
        <select id="sel-classe"><option value="">— Choisir —</option></select>
      </div>
      <div class="field">
        <label class="field-label">Mon nom</label>
        <select id="sel-eleve" disabled><option value="">— Choisir ma classe d'abord —</option></select>
      </div>
      <div id="zone-mdp" style="display:none">
        <div class="field">
          <label class="field-label" id="mdp-label">Mon mot de passe</label>
          <input type="password" id="inp-mdp" placeholder="••••••••" maxlength="10" autocomplete="off">
          <div class="mdp-rules" id="mdp-rules" style="display:none">6 à 10 lettres minuscules, sans accent ni caractère spécial</div>
          <div class="error-msg" id="err-mdp">Mot de passe incorrect.</div>
        </div>
        <div id="zone-mdp2" style="display:none" class="field">
          <label class="field-label">Confirmer le mot de passe</label>
          <input type="password" id="inp-mdp2" placeholder="••••••••" maxlength="10" autocomplete="off">
          <div class="error-msg" id="err-mdp2">Les mots de passe ne correspondent pas.</div>
        </div>
      </div>
      <button class="btn" id="btn-login" disabled>Entrer</button>
    </div>
    <div style="text-align:center;margin-top:1.25rem;display:flex;justify-content:center;align-items:center;gap:1.2rem">
      <button onclick="showTutoLogin()" style="font-size:.82rem;color:var(--muted);background:none;border:none;cursor:pointer">📖 Comment utiliser l'application ?</button>
      <button id="btn-theme-login" onclick="toggleTheme()" style="border:none;background:none;cursor:pointer;font-size:1.2rem;line-height:1;padding:0" title="Changer le thème">🌙</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     ÉCRAN PRINCIPAL (avec nav)
══════════════════════════════════════════════════ -->
<div id="screen-app" class="screen">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">Course</div>
    <div class="topbar-info">
      <span id="tb-prenom" style="text-transform:uppercase">—</span>
      <span id="tb-sep" style="color:var(--muted)"> · </span>
      <span id="tb-projet-label" style="color:var(--muted);font-size:.75rem"></span>
      <span id="tb-seance-label" style="color:var(--accent)"></span>
    </div>
    <button class="hamburger-btn" id="btn-hamburger" onclick="toggleHamburger()" title="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="hamburger-menu" id="hamburger-menu">
      <button class="hmenu-item" onclick="toggleTheme();closeHamburger()">
        <span id="hmenu-theme-icon">🌙</span>
        <span id="hmenu-theme-label">Thème sombre</span>
      </button>
      <div class="hmenu-separator"></div>
      <button class="hmenu-item" onclick="showPage('lexique');closeHamburger()">📖 Lexique</button>
      <button class="hmenu-item" onclick="showPage('tuto');closeHamburger()">❓ Tutoriel</button>
      <div class="hmenu-separator"></div>
      <button class="hmenu-item" id="btn-logout">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Se déconnecter
      </button>
    </div>
  </div>

  <!-- Pages (contenu rendu dynamiquement par JS) -->
  <div id="page-accueil"    class="scroll" style="display:none"></div>
  <div id="page-projet"     class="scroll" style="display:none"></div>
  <div id="page-seance"     class="scroll" style="display:none"></div>
  <div id="page-progression" class="scroll" style="display:none"></div>
  <div id="page-lexique"    class="scroll" style="display:none"></div>
  <div id="page-tuto"       class="scroll" style="display:none"></div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" data-page="accueil">
      <span class="nav-icon">🏠</span>Accueil
    </button>
    <button class="nav-btn" data-page="projet">
      <span class="nav-icon">🎯</span>Mon projet
    </button>
    <button class="nav-btn" data-page="seance">
      <span class="nav-icon">🏃</span>Séance
    </button>
    <button class="nav-btn" data-page="progression">
      <span class="nav-icon">📈</span>Progression
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     OVERLAYS
══════════════════════════════════════════════════ -->

<!-- Loading -->
<div class="overlay hidden" id="loading" style="flex-direction:column;gap:1rem">
  <div class="spinner" id="loading-spinner"></div>
  <div id="loading-msg" style="color:#fff;font-size:.88rem;text-align:center;line-height:1.5;display:none"></div>
  <button id="loading-retry" onclick="initLogin()" style="display:none;margin-top:.5rem;padding:.6rem 1.4rem;border:none;border-radius:8px;background:#fff;color:#333;font-size:.95rem;font-weight:600;cursor:pointer">Réessayer</button>
</div>

<!-- Accès bloqué -->
<div class="overlay hidden" id="acces-bloque" style="flex-direction:column;gap:1.2rem;padding:2rem;text-align:center">
  <div style="font-size:2.5rem">🔒</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:#fff">Application indisponible</div>
  <div id="msg-bloque" style="font-size:.95rem;color:rgba(255,255,255,.8);line-height:1.6;max-width:280px"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal générique (confirmation) -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal">
    <h3 id="modal-titre"></h3>
    <p  id="modal-texte"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modal-cancel">Annuler</button>
      <button class="btn"             id="modal-confirm">Confirmer</button>
    </div>
  </div>
</div>

<!-- Badge zoom -->
<div class="overlay hidden" id="badge-zoom" onclick="closeBadgeZoom()" style="flex-direction:column;gap:1rem;cursor:pointer">
  <div id="badge-zoom-emoji" style="font-size:7rem;line-height:1"></div>
  <div id="badge-zoom-label" style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;color:#fff"></div>
  <div style="font-size:.78rem;color:rgba(255,255,255,.45)">Appuyez n'importe où pour fermer</div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
